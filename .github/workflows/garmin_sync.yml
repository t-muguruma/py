name: Garmin Data Sync

on:
  # 1. 毎朝7時に自動実行 (JSTで朝7時は、UTCで前日の22時)
  # 2. 毎晩23:59に自動実行 (JSTで23:59は、UTCで同日の14:59)
  schedule:
    # 1. 毎朝7時に自動実行 (JSTで朝7時は、UTCで前日の22時)
    - cron: '0 22 * * *'
    # 2. 毎晩23:59に自動実行 (JSTで23:59は、UTCで同日の14:59)
    - cron: '59 14 * * *'

  # 外部APIからのPOST (repository_dispatch) を受け付ける
  repository_dispatch:
    types: [garmin_sync_request]

  # 手動実行時に日付指定を可能にする
  workflow_dispatch:
    inputs:
      target_date:
        description: '対象日付 (YYYY-MM-DD)'
        required: false
        type: string

jobs:
  sync:
    runs-on: ubuntu-latest
    # Gitルート直下にスクリプトがあるので、ディレクトリ移動の指定は不要です

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip' # pipのキャッシュも有効化しておくと高速化されます

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install --upgrade garminconnect garth pandas gspread google-auth python-dotenv

    - name: Restore Garmin Session from Secret
      run: |
        # 1. Base64デコード
        echo "${{ secrets.GARMIN_SESSION_BASE64 }}" | base64 -d > garth_temp.zip
        
        # 2. 強制解凍（警告が出ても無視して次へ進むジェ）
        mkdir -p temp_extract
        unzip -o garth_temp.zip -d temp_extract || true
        
        # 3. .garth フォルダを綺麗に作る
        mkdir -p .garth
        
        # 4. 階層を無視して json を .garth 直下に集める
        find temp_extract -name "*.json" -exec mv -v {} .garth/ \;
        
        # 5. 最終確認（これが出れば Python は絶対に動くジェ）
        ls -la .garth/

    - name: Run Garmin Sync script
      env:
        GARMIN_EMAIL: ${{ secrets.GARMIN_EMAIL }}
        GARMIN_PASSWORD: ${{ secrets.GARMIN_PASSWORD }}
        SA_KEY: ${{ secrets.SA_KEY }}
        # POSTされたJSON(client_payload) または 手動入力(inputs) から日付を取得
        TARGET_DATE: ${{ github.event.client_payload.target_date || github.event.client_payload.calendarDate || inputs.target_date }}
      run: python garmin_sync.py
