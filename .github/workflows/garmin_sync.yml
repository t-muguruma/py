name: Garmin Data Sync

on:
  # 1. 毎朝7時に自動実行 (JSTで朝7時は、UTCで前日の22時)
  # 2. 毎晩23:59に自動実行 (JSTで23:59は、UTCで同日の14:59)
  schedule:
    # 1. 毎朝7時に自動実行 (JSTで朝7時は、UTCで前日の22時)
    - cron: '0 22 * * *'
    # 2. 毎晩23:59に自動実行 (JSTで23:59は、UTCで同日の14:59)
    - cron: '59 14 * * *'

  # 2. 手動実行やAPIからの実行を許可するトリガー
  # 手動実行やAPIからの実行を許可するトリガー
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    # Gitルート直下にスクリプトがあるので、ディレクトリ移動の指定は不要です

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip' # pipのキャッシュも有効化しておくと高速化されます

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install --upgrade garminconnect garth pandas gspread google-auth python-dotenv

    - name: Restore Garmin Session from Secret
      run: |
        echo "${{ secrets.GARMIN_SESSION_BASE64 }}" | base64 -d > garth_temp.zip
        # 一旦 temp フォルダに全部出す
        mkdir -p temp_extract
        unzip -o garth_temp.zip -d temp_extract
        
        # 📂 .garth フォルダをクリーンに作り直す
        mkdir -p .garth
        
        # 🕵️ 中身がどこにあろうが、jsonファイルを .garth 直下に移動させるジェ！
        find temp_extract -name "*.json" -exec mv {} .garth/ \;
        
        # ✅ デバッグ：これでファイルが見えれば「勝ち確」
        ls -la .garth/

    - name: Run Garmin Sync script
      env:
        GARMIN_EMAIL: ${{ secrets.GARMIN_EMAIL }}
        GARMIN_PASSWORD: ${{ secrets.GARMIN_PASSWORD }}
        SA_KEY: ${{ secrets.SA_KEY }}
      run: python garmin_sync.py
