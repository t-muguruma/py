name: Garmin Data Sync

on:
  # 1. 毎朝7時に自動実行 (JSTで朝7時は、UTCで前日の22時)
  # 2. 毎晩23:59に自動実行 (JSTで23:59は、UTCで同日の14:59)
  schedule:
    - cron: '0 22 * * *'
    - cron: '59 14 * * *'

  # 2. 手動実行やAPIからの実行を許可するトリガー
  repository_dispatch:
    types: [garmin_sync]

jobs:
  sync:
    runs-on: ubuntu-latest
    # Gitルート直下にスクリプトがあるので、ディレクトリ移動の指定は不要です

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10' 

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas gspread google-auth garminconnect python-dotenv

    - name: Run Garmin Sync script
      env:
        GARMIN_EMAIL: ${{ secrets.GARMIN_EMAIL }}
        GARMIN_PASSWORD: ${{ secrets.GARMIN_PASSWORD }}
        SA_KEY: ${{ secrets.SA_KEY }}
      run: python garmin_sync.py
